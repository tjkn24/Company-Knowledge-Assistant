# prometheus.yml — Prometheus Scrape Configuration
# ==================================================
# Prometheus scrapes metrics from the agent API every 15 seconds
# and stores them as time-series data for Grafana dashboards.
#
# WHAT GETS COLLECTED:
#   agent_runs_total           — how many agent runs by workflow
#   agent_tokens_total         — total tokens consumed
#   agent_cost_usd_total       — total estimated cost
#   agent_run_duration_seconds — response time histogram
#   guardrail_blocks_total     — security events

global:
  scrape_interval: 15s      # collect metrics every 15 seconds
  evaluation_interval: 15s

scrape_configs:
  - job_name: "agent-api"
    static_configs:
      - targets: ["agent-api:8000"]   # Docker service name:port
    metrics_path: "/metrics"
